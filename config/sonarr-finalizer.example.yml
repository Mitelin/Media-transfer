# Copy to config/sonarr-finalizer.yml and fill local secrets/endpoints.
# Keep config/sonarr-finalizer.yml untracked.

active_instance: "anime"

sonarr_instances:
  tv:
    url: "http://sonarr:8989"
    lan_url: "http://LAN_SONARR_HOST:8989"
    tailscale_url: "http://TAILSCALE_SONARR_HOST:8989"
    api_key: ""
    instance_type: "tv"
    maintenance_roots:
      staging_en: "/tv-en"

  anime:
    url: "http://sonarr-anime:8989"
    lan_url: "http://LAN_SONARR_HOST:8990"
    tailscale_url: "http://TAILSCALE_SONARR_HOST:8990"
    api_key: ""
    instance_type: "anime"
    maintenance_roots:
      staging_jp: "/anime-jp"

radarr_instances:
  movies:
    url: "http://radarr:7878"
    lan_url: "http://LAN_RADARR_HOST:7878"
    tailscale_url: "http://TAILSCALE_RADARR_HOST:7878"
    api_key: ""
    instance_type: "movie"
    maintenance_roots:
      staging_en: "/movies-en"

jellyfin:
  enabled: false
  url: "http://jellyfin:8096"
  lan_url: "http://LAN_JELLYFIN_HOST:8096"
  tailscale_url: "http://TAILSCALE_JELLYFIN_HOST:8096"
  api_key: ""
  refresh_after_move: true

paths:
  local_mounts: []

  mappings:
    - name: "TV English maintenance to Czech target"
      instance_type: "tv"
      source_prefix: "/tv-en"
      target_prefix: "/tv-cz"
      final_language: "cz"

    - name: "Anime Japanese maintenance to English target"
      instance_type: "anime"
      source_prefix: "/anime-jp"
      target_prefix: "/anime-en"
      final_language: "en"

    - name: "Movie English maintenance to Czech target"
      instance_type: "movie"
      source_prefix: "/movies-en"
      target_prefix: "/movies-cz"
      final_language: "cz"

rules:
  tv:
    allowed_final_audio_languages:
      - "cz"
    require_all_episode_files: true
    evaluate_monitored_only: true
    allow_subtitle_as_final: false
    allow_sonarr_language_fallback: true

  anime:
    allowed_final_audio_languages:
      - "en"
    require_all_episode_files: true
    evaluate_monitored_only: true
    allow_subtitle_as_final: false
    allow_sonarr_language_fallback: true

  movie:
    allowed_final_audio_languages:
      - "cz"
    allow_subtitle_as_final: false
    allow_radarr_language_fallback: true

safety:
  dry_run: true
  allowed_event_types:
    - "Download"
    - "Import"
    - "Upgrade"
  skip_specials: true
  min_file_size_mb: 50
  fail_if_destination_exists: true
  move_to_temporary_folder_first: true
  temporary_suffix: ".__moving__"

logging:
  path: "logs/sonarr-finalizer.log"
  level: "INFO"
